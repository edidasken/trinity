<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Absolute base so all relative URLs resolve to GitHub Pages regardless of embed host -->
  <base href="https://flock-os.github.io/FlockOS/New_Covenant/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no, date=no, email=no, address=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FlockShow">
  <meta name="theme-color" content="#0b0d14">
  <title>FlockShow — FlockOS</title>

  <!-- Icons -->
  <link rel="icon" type="image/png" href="Images/icon-show.svg">
  <link rel="apple-touch-icon" href="Images/icon-show.svg">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <!-- App CSS -->
  <link rel="stylesheet" href="Styles/new_covenant.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: var(--bg); overscroll-behavior: none; }
    :root { --safe-top: env(safe-area-inset-top, 0px); --topbar-h: 54px; }

    /* ── Embed auth overlay ───────────────────────────────────────────────── */
    #embed-auth-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    }
    #embed-auth-overlay.hidden { display: none; }

    .embed-auth-card {
      width: 100%; max-width: 360px;
      background: var(--bg-raised);
      border: 1px solid rgba(212,175,55,0.28);
      border-radius: 16px;
      padding: 36px 32px 28px;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.18), 0 0 0 1px rgba(212,175,55,0.06);
      margin: 0 16px;
    }
    .embed-auth-icon {
      width: 56px; height: 56px; border-radius: 12px; margin-bottom: 6px;
    }
    .embed-auth-card h1 {
      font-size: 1.35rem; font-weight: 800;
      color: var(--ink); margin-bottom: 2px;
    }
    .embed-auth-card p {
      font-size: 0.8rem; color: var(--ink-muted);
      text-align: center; margin-bottom: 18px; line-height: 1.5;
    }
    .embed-auth-field {
      width: 100%; display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px;
    }
    .embed-auth-input {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid rgba(212,175,55,0.25);
      border-radius: 8px;
      padding: 10px 13px;
      color: var(--ink);
      font: 500 0.88rem 'Plus Jakarta Sans', sans-serif;
      outline: none;
      -webkit-appearance: none; appearance: none;
      transition: border-color 0.15s;
    }
    .embed-auth-input:focus {
      border-color: rgba(212,175,55,0.6);
      box-shadow: 0 0 0 3px rgba(212,175,55,0.08);
    }
    .embed-auth-input::placeholder { color: var(--ink-faint); }
    .embed-auth-btn {
      width: 100%; padding: 11px 0;
      background: linear-gradient(135deg, #d4af37, #b8962e);
      border: none; border-radius: 9px;
      color: #1a0f00; font: 700 0.88rem 'Plus Jakarta Sans', sans-serif;
      cursor: pointer; transition: opacity 0.15s, transform 0.1s;
      margin-top: 4px;
    }
    .embed-auth-btn:hover { opacity: 0.92; }
    .embed-auth-btn:active { transform: scale(0.98); }
    .embed-auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .embed-auth-err {
      width: 100%;
      background: rgba(220,50,50,0.12);
      border: 1px solid rgba(220,50,50,0.3);
      border-radius: 7px;
      padding: 8px 12px;
      color: #ff8080;
      font-size: 0.78rem;
      text-align: center;
      margin-top: 8px;
    }
    .embed-auth-verse {
      margin-top: 22px;
      font: italic 0.72rem 'Noto Serif', serif;
      color: rgba(212,175,55,0.45);
      text-align: center;
    }
  </style>

  <!-- Firebase config — patched per-church by B-Build -->
  <script>

      apiKey:  'AIzaSyDIJD_nOWkIWTwtFgNrfwTSr8BjAWDxKtQ',
      authDomain:  'flockos-trinity.firebaseapp.com',
      projectId:  'flockos-trinity',
      storageBucket:  'flockos-trinity.firebasestorage.app',
      messagingSenderId:  '1068495552013',
      appId:  '1:1068495552013:web:36b868b29367cf65d45f44',
      measurementId:  'G-E7KXEN8C3E',
    };
  </script>

  <!-- Firebase SDK (must load before auth init script) -->
  <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <!-- Firebase initializer + Firestore wrapper -->
  <script defer src="Scripts/the_true_vine.js"></script>
  <script defer src="Scripts/the_upper_room.js"></script>

  <!-- Embed auth controller — runs after all defer scripts above -->
  <script defer>
    var _fsBooted = false;

    function _embedFriendlyError(code) {
      var map = {
        'auth/user-not-found':    'No account found with that email.',
        'auth/wrong-password':    'Incorrect password.',
        'auth/invalid-email':     'Please enter a valid email address.',
        'auth/too-many-requests': 'Too many attempts. Please try again later.',
        'auth/invalid-credential':'Invalid email or password.',
        'auth/network-request-failed': 'Network error. Check your connection.'
      };
      return map[code] || 'Sign-in failed. Please try again.';
    }

    function _showEmbedErr(msg) {
      var el = document.getElementById('embed-login-err');
      if (!el) return;
      el.textContent = msg;
      el.hidden = false;
    }
    function _hideEmbedErr() {
      var el = document.getElementById('embed-login-err');
      if (el) el.hidden = true;
    }

    // Called once the Firebase user is confirmed — boots FlockShow module
    function _embedBoot(user) {
      if (_fsBooted) return;
      _fsBooted = true;

      // Expose a minimal Nehemiah so flockshow.js auth gate passes
      window.Nehemiah = {
        isAuthenticated: function() { return !!firebase.auth().currentUser; },
        getSession: function() {
          var u = firebase.auth().currentUser;
          return u ? { uid: u.uid, email: u.email, displayName: u.displayName || u.email } : null;
        },
        logout: function() {
          firebase.auth().signOut().then(function() { location.reload(); });
        }
      };

      // Hide the auth overlay
      var overlay = document.getElementById('embed-auth-overlay');
      if (overlay) overlay.classList.add('hidden');

      // Dynamically import FlockShow (absolute URL bypasses base-href ambiguity in import())
      import('https://flock-os.github.io/FlockOS/New_Covenant/app.flockshow/flockshow.js')
        .catch(function(e) { console.error('[FlockShow embed] module load failed', e); });
    }

    // Wire up Firebase auth state listener
    firebase.auth().onAuthStateChanged(function(user) {
      if (user) {
        _embedBoot(user);
      } else {
        // Ensure login overlay is visible
        var overlay = document.getElementById('embed-auth-overlay');
        if (overlay) overlay.classList.remove('hidden');
      }
    });

    // Login form handler
    document.getElementById('embed-login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var email    = document.getElementById('embed-email').value.trim();
      var password = document.getElementById('embed-password').value;
      var btn      = document.getElementById('embed-login-btn');
      _hideEmbedErr();
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      firebase.auth().signInWithEmailAndPassword(email, password)
        .catch(function(err) {
          _showEmbedErr(_embedFriendlyError(err.code));
          btn.disabled = false;
          btn.textContent = 'Sign In';
        });
      // On success, onAuthStateChanged fires and calls _embedBoot()
    });
  </script>
</head>
<body>

  <!-- ── Auth overlay (shown by default; hidden after successful sign-in) ── -->
  <div id="embed-auth-overlay">
    <div class="embed-auth-card">
      <img class="embed-auth-icon" src="Images/icon-show.svg" alt="FlockShow" onerror="this.style.display='none'">
      <h1>FlockShow</h1>
      <p>Sign in with your FlockOS account to access worship presentations.</p>
      <form id="embed-login-form" class="embed-auth-field" novalidate>
        <input  id="embed-email"
                class="embed-auth-input"
                type="email"
                placeholder="Email address"
                autocomplete="email"
                required>
        <input  id="embed-password"
                class="embed-auth-input"
                type="password"
                placeholder="Password"
                autocomplete="current-password"
                required>
        <button id="embed-login-btn" class="embed-auth-btn" type="submit">Sign In</button>
        <div    id="embed-login-err" class="embed-auth-err" hidden></div>
      </form>
      <p class="embed-auth-verse">"Praise Him with strings and pipe." — Psalm 150:4</p>
    </div>
  </div>

  <!-- ── FlockShow shell (mirrors app.flockshow.html; populated by flockshow.js) ── -->
  <div id="fs-root" style="
    display:grid;
    grid-template-rows:calc(54px + env(safe-area-inset-top, 0px)) 1fr;
    height:100dvh;
    background:var(--bg);
    color:var(--ink);
    font-family:'Plus Jakarta Sans',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  ">
    <header id="fs-topbar" style="
      display:flex;align-items:center;gap:10px;padding:env(safe-area-inset-top, 0px) 18px 0;
      background:var(--top-bg);border-bottom:1px solid var(--top-line);
      z-index:200;position:relative;
    ">
      <div class="fs-logo" style="display:flex;align-items:center;gap:8px;font:700 0.95rem 'Plus Jakarta Sans',sans-serif;color:var(--top-ink);flex-shrink:0;margin-right:6px;">
        <div style="width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,#a78bfa,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:15px;">🎬</div>
        <span>FlockShow</span>
      </div>
      <div class="fs-tab-bar" id="fs-tabs" style="display:flex;gap:2px;background:rgba(255,255,255,0.05);border-radius:8px;padding:3px;"></div>
      <div id="fs-topbar-right" style="margin-left:auto;display:flex;align-items:center;gap:8px;">
        <button id="fs-present-btn" disabled style="display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:8px;font:600 0.78rem 'Plus Jakarta Sans',sans-serif;cursor:pointer;border:none;background:var(--gold,#e8a838);color:#0c0a00;white-space:nowrap;">▶ Present</button>
      </div>
    </header>

    <div id="fs-library" style="overflow-y:auto;padding:28px 32px 80px;"></div>
    <div id="fs-editor" hidden style="display:grid;grid-template-rows:46px 1fr;overflow:hidden;"></div>
  </div>

  <!-- flockshow.js is dynamically imported by the embed auth controller above -->
  <!-- after Firebase auth confirms the user is signed in.                      -->

</body>
</html>
