<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Absolute base so all relative URLs resolve to GitHub Pages regardless of embed host -->
  <base href="https://flock-os.github.io/FlockOS/New_Covenant/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no, date=no, email=no, address=no">
  <meta name="theme-color" content="#0c1445">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>FlockChat — FlockOS</title>

  <link rel="icon" type="image/png" href="https://flock-os.github.io/FlockOS/New_Covenant/Images/icon-chat.svg">
  <link rel="apple-touch-icon" href="https://flock-os.github.io/FlockOS/New_Covenant/Images/icon-chat.svg">
  <link rel="manifest" href="https://flock-os.github.io/FlockOS/New_Covenant/app.flockchat/manifest.json">

  <link rel="stylesheet" href="https://flock-os.github.io/FlockOS/New_Covenant/Styles/new_covenant.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--bg);
    }
    #fc-embed-frame {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: var(--bg);
    }
  </style>
</head>
<body>
  <!--
    FlockChat embed — thin iframe wrapper around the canonical app.
    The chat app's DOM shell + controller live in app.flockchat/app.flockchat.html
    and must be loaded together. Embedding via iframe guarantees zero drift
    from the canonical app and works inside any host page.
  -->
  <iframe
    id="fc-embed-frame"
    src="https://flock-os.github.io/FlockOS/New_Covenant/app.flockchat/app.flockchat.html"
    title="FlockChat"
    allow="clipboard-read; clipboard-write; microphone; camera; autoplay; fullscreen"
    referrerpolicy="strict-origin-when-cross-origin"
    loading="eager"></iframe>
</body>
</html>
