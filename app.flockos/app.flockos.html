    Auto-start the new shell. the_ark.js gates auto-start on ?covenant=new,
    so during the transition both old and new shells coexist; here we are

  -->

      const u = new URL(location.href);
      u.searchParams.set('covenant', 'new');

  <!-- Pull-to-Refresh indicator -->
  <div class="ptr-indicator" id="ptrIndicator">&#8635; Release to refresh</div>
  <script>
  // ── Pull-to-Refresh ────────────────────────────────────────────────────────
  (function () {
    if (window.innerWidth > 860) return; // desktop — skip
    var mainEl  = document.getElementById('the-holy-place');
    var ptr     = document.getElementById('ptrIndicator');
    if (!mainEl || !ptr) return;
    var startY = 0, pulling = false, triggered = false;

    mainEl.addEventListener('touchstart', function (e) {
      if (mainEl.scrollTop > 5) return;
      startY   = e.touches[0].clientY;
      pulling  = true;
      triggered = false;
    }, { passive: true });

    mainEl.addEventListener('touchmove', function (e) {
      if (!pulling) return;
      var dy = e.touches[0].clientY - startY;
      if (dy > 60 && !triggered) {
        triggered = true;
        ptr.classList.add('visible');
      } else if (dy < 30) {
        triggered = false;
        ptr.classList.remove('visible');
      }
    }, { passive: true });

    mainEl.addEventListener('touchend', function () {
      if (triggered) {
        ptr.textContent = 'Refreshing\u2026';
        setTimeout(function () { location.reload(); }, 300);
      } else {
        ptr.classList.remove('visible');
      }
      pulling   = false;
      triggered = false;
    }, { passive: true });
  })();
  </script>
