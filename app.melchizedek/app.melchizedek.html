  <link rel="apple-touch-icon" href="Images/icon-melchizedek.svg">

  <!-- PWA manifest -->

  <meta name="mobile-web-app-capable" content="yes">

  <meta name="apple-mobile-web-app-title" content="Melchizedek">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <link rel="preconnect" href="https://identitytoolkit.googleapis.com">
  <link rel="preconnect" href="https://securetoken.googleapis.com">

  <!-- Flash prevention: apply saved FlockOS theme before first paint -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('flock_theme') || 'america';
        document.documentElement.setAttribute('data-theme', t);
      } catch (_) {
        document.documentElement.setAttribute('data-theme', 'america');
      }
    })();
  </script>

  <!-- Styles -->
  <link rel="stylesheet" href="Styles/new_covenant.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    /* Boot splash */
    #melch-boot {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: var(--bg, #0e1628); gap: 14px;
    }
    #melch-boot .boot-icon { width: 52px; height: 52px; opacity: 0.85; }
    #melch-boot .boot-label {
      font: 700 0.72rem/1 var(--font-ui, 'Plus Jakarta Sans', sans-serif);
      letter-spacing: .14em; text-transform: uppercase;
      color: var(--gold, #e8a838); opacity: 0.7;
    }
    #melch-boot .boot-sub {
      font: 400 0.78rem/1 var(--font-ui, 'Plus Jakarta Sans', sans-serif);
      color: var(--ink-muted, #7a7f96);
    }

    /* Unity header — must span full grid width inside veil-wrap */
    .veil-wrap > .unity-header { grid-area: top !important; }

    /* Pull-to-refresh */
    .ptr-indicator {
      position: sticky; top: 0; z-index: 100;
      text-align: center; padding: 8px;
      font: 600 0.78rem var(--font-ui, sans-serif);
      color: var(--gold, #e8a838); background: var(--bg, #0e1628);
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .ptr-indicator.visible { opacity: 1; }
  </style>
</head>
<body class="veil-app">

      <polyline points="9,12 11,14 15,10"/>

    <div class="boot-label">Melchizedek</div>
    <div class="boot-sub">Background Checks</div>
  </div>

  <!-- App root -->
  <div id="melch-app" hidden>
    <div class="veil-wrap">

      <!-- Unity Header -->
      <header class="unity-header" id="melch-topbar" role="banner"></header>

      <!-- Sidebar -->

          <span class="pillars-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>

      <!-- Main content -->

  <!-- Pull-to-Refresh -->
  <script>
  (function () {
    if (window.innerWidth > 860) return;
    var mainEl  = document.getElementById('gp-main');
    var ptr     = document.getElementById('ptrIndicator');
    if (!mainEl || !ptr) return;
    var startY = 0, pulling = false, triggered = false;
    mainEl.addEventListener('touchstart', function (e) {
      if (mainEl.scrollTop > 5) return;
      startY = e.touches[0].clientY; pulling = true; triggered = false;
    }, { passive: true });
    mainEl.addEventListener('touchmove', function (e) {
      if (!pulling) return;
      var dy = e.touches[0].clientY - startY;
      if (dy > 60 && !triggered) { triggered = true; ptr.classList.add('visible'); }
      else if (dy < 30) { triggered = false; ptr.classList.remove('visible'); }
    }, { passive: true });
    mainEl.addEventListener('touchend', function () {
      if (triggered) { ptr.textContent = 'Refreshing…'; setTimeout(function () { location.reload(); }, 300); }
      else { ptr.classList.remove('visible'); }
      pulling = false; triggered = false;
    }, { passive: true });
  })();
  </script>

</body>
