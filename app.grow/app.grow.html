  <!-- Flash prevention: apply saved FlockOS theme before first paint -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('flock_theme') || 'america';
        document.documentElement.setAttribute('data-theme', t);
      } catch (_) {
        document.documentElement.setAttribute('data-theme', 'america');
      }
    })();
  </script>

  <!-- Styles — one file: american_garments is merged into new_covenant.css -->
  <link rel="stylesheet" href="Styles/new_covenant.css">

  <!--
    Flash prevention + shell layout.
    Mirrors the main app shell exactly so all CSS classes work identically.
    We define --sidebar-w here so the CSS grid picks it up.
  -->
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    /* Don't override NC theme tokens — let new_covenant.css :root values flow through */

    html, body {
      height: 100dvh; margin: 0; padding: 0;
      color: var(--ink);
      overflow: hidden;
      overscroll-behavior: none;
    }
    /* html stays dark navy (from new_covenant.css) so iOS safe-area matches footer */
    body { background: var(--bg); }

    /* ── Shell grid — mirrors .veil-wrap from new_covenant.css ─────────── */
    .gp-wrap {
      display: grid;
      grid-template-areas: "top top" "side main" "foot foot";
      grid-template-columns: var(--sidebar-w, 256px) 1fr;
      grid-template-rows: calc(var(--topbar-h, 60px) + var(--safe-top, 0px)) 1fr auto;
      height: 100dvh;
      position: relative;
    }
    #gp-topbar-wrap  { grid-area: top; }
    #gp-sidebar-wrap { grid-area: side; overflow-y: auto; overflow-x: hidden; }
    #gp-main         { grid-area: main; overflow-y: auto; overflow-x: hidden; padding: 24px 28px 24px; min-width: 0; }
    #gp-main > *     { max-width: 1200px; margin-left: auto; margin-right: auto; }
    #grow-footer     { grid-area: foot; }

    /* ── Topbar ──────────────────────────────────────────────────────────── */
    #gp-topbar-wrap { grid-area: top; display: flex; }
    #gp-topbar {
      display: flex; align-items: center; gap: 12px;
      width: 100%; padding: var(--safe-top, 0px) 20px 0;
      background: var(--top-bg);
      border-bottom: 1px solid var(--top-line);
      color: var(--top-ink);
      position: relative; z-index: 400;
    }
    #gp-topbar::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 2.5px; pointer-events: none;
      background: var(--grad-rainbow);
      background-size: 200% 100%;
      animation: gp-rainbow 9s linear infinite;
      opacity: 0.72;
    }
    @keyframes gp-rainbow { from { background-position: 0% 0; } to { background-position: 200% 0; } }
    @media (prefers-reduced-motion: reduce) { #gp-topbar::after { animation: none; opacity: 0.5; } }

    /* ── CTA button / sign-in dropdown ────────────────────────────────────── */
    .gp-cta {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 999px;
      background: var(--gold, #e8a838); color: #0c1445;
      font: 600 0.82rem var(--font-ui, 'Plus Jakarta Sans', sans-serif);
      text-decoration: none; border: 0; cursor: pointer; flex-shrink: 0;
      transition: background 150ms, transform 100ms, box-shadow 150ms;
      box-shadow: 0 2px 10px rgba(232,168,56,0.35);
    }
    .gp-cta:hover { background: #f0b534; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(232,168,56,0.50); }
    .gp-cta:active { transform: scale(0.97); }

    /* Sign-in dropdown */
    .gp-signin-dropdown {
      position: absolute; top: calc(100% + 10px); right: 0;
      width: 260px;
      background: var(--bg-raised, #fff);
      border: 1px solid var(--line, #e5e7ef);
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(15,23,42,0.16), 0 4px 12px rgba(15,23,42,0.08);
      z-index: 500;
      overflow: hidden;
      animation: gp-dropdown-in 160ms cubic-bezier(.2,.8,.2,1);
    }
    @keyframes gp-dropdown-in {
      from { opacity: 0; transform: translateY(-6px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .gp-signin-dropdown-inner { padding: 22px 20px 18px; text-align: center; }
    .gp-signin-title {
      font: 700 1rem var(--font-ui, sans-serif); color: var(--ink, #1b264f);
      margin: 0 0 6px;
    }
    .gp-signin-sub {
      font: 0.82rem var(--font-ui, sans-serif); color: var(--ink-muted, #7a7f96);
      margin: 0 0 18px; line-height: 1.5;
    }
    .gp-signin-cta { width: 100%; justify-content: center; border-radius: 10px; padding: 10px 18px; }
    .gp-signin-foot {
      margin: 14px 0 0;
      font: 0.74rem var(--font-ui, sans-serif); color: var(--ink-muted, #7a7f96);
    }
    .gp-signin-foot strong { color: var(--ink, #1b264f); font-weight: 600; }

    /* ── Sidebar wrapper — mobile overlay behaviour ───────────────────────── */
    #gp-sidebar-wrap {
      background: var(--side-bg);
      color: var(--side-ink);
      padding: 14px 10px 120px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.10) transparent;
      display: flex; flex-direction: column;
    }
    #gp-sidebar-wrap::-webkit-scrollbar { width: 4px; }
    #gp-sidebar-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }
    #gp-sidebar { display: flex; flex-direction: column; gap: 0; flex: 1; }

    /* ── Full-access banner at bottom of home page ───────────────────────── */
    .gp-full-access-banner {
      margin-top: 40px; border-radius: 16px;
      background: linear-gradient(135deg, rgba(232,168,56,0.12) 0%, rgba(124,58,237,0.10) 100%);
      border: 1px solid rgba(232,168,56,0.22);
      padding: 20px 24px;
    }
    .gp-full-access-inner { display: flex; align-items: center; flex-wrap: wrap; gap: 14px; }
    .gp-full-access-label { flex: 1; font: 500 0.95rem var(--font-ui); color: var(--ink, #1b264f); min-width: 200px; }

    /* ── Hamburger (hidden on desktop) ──────────────────────────────────── */
    .gp-hamburger { color: rgba(255,255,255,0.72) !important; }

    /* ── Mobile breakpoint ───────────────────────────────────────────────── */
    @media (max-width: 860px) {
      .gp-wrap {
        grid-template-columns: 1fr;
        grid-template-areas: "top" "main" "foot";
      }
      #gp-sidebar-wrap {
        display: none;
        position: fixed; top: calc(var(--topbar-h, 60px) + var(--safe-top, 0px));
        left: 0; bottom: 0;
        width: min(280px, 85vw);
        z-index: 300;
        overflow-y: auto;
        /* Slide-in animation */
        transform: translateX(-100%);
        transition: transform 220ms cubic-bezier(.2,.8,.2,1);
      }
      #gp-sidebar-wrap.gp-sidebar-open {
        display: flex;
        transform: translateX(0);
      }
      /* Backdrop when sidebar is open */
      #gp-sidebar-wrap.gp-sidebar-open::before {
        content: '';
        position: fixed; inset: 0;
        background: var(--modal-dim);
        z-index: -1;
        left: min(280px, 85vw);
        width: calc(100vw - min(280px, 85vw));
      }
      .gp-hamburger { display: inline-flex !important; }
      #gp-main { padding: 16px 16px 120px; }
    }

    @media (min-width: 861px) {
      .gp-hamburger { display: none !important; }
    }

    /* .ptr-indicator now lives in new_covenant.css — single source of truth. */
  </style>
</head>
<body>
  <div class="gp-wrap">

    <nav id="gp-sidebar-wrap" role="navigation" aria-label="GROW modules">

  <!--
    grow_public.js bootstraps the full page:
    sidebar, topbar CTA, hash-based module routing.
    Firebase compat SDK loaded here so prayer/outreach submissions can write
    to Firestore without requiring the user to sign in.
  -->
  <!-- Pull-to-Refresh indicator -->
  <div class="ptr-indicator" id="ptrIndicator">&#8635; Release to refresh</div>

  <script>
  // ── Pull-to-Refresh ────────────────────────────────────────────────────────
  (function () {
    if (window.innerWidth > 860) return; // desktop — skip
    var mainEl  = document.getElementById('gp-main');
    var ptr     = document.getElementById('ptrIndicator');
    if (!mainEl || !ptr) return;
    var startY = 0, pulling = false, triggered = false;

    mainEl.addEventListener('touchstart', function (e) {
      if (mainEl.scrollTop > 5) return; // only trigger at top
      startY   = e.touches[0].clientY;
      pulling  = true;
      triggered = false;
    }, { passive: true });

    mainEl.addEventListener('touchmove', function (e) {
      if (!pulling) return;
      var dy = e.touches[0].clientY - startY;
      if (dy > 60 && !triggered) {
        triggered = true;
        ptr.classList.add('visible');
      } else if (dy < 30) {
        triggered = false;
        ptr.classList.remove('visible');
      }
    }, { passive: true });

    mainEl.addEventListener('touchend', function () {
      if (triggered) {
        ptr.textContent = 'Refreshing\u2026';
        setTimeout(function () { location.reload(); }, 300);
      } else {
        ptr.classList.remove('visible');
      }
      pulling   = false;
      triggered = false;
    }, { passive: true });
  })();
  </script>
